services:
  db:
    image: postgres:16-alpine
    container_name: salescat-db
    environment:
      POSTGRES_USER: salescat
      POSTGRES_PASSWORD: salescat
      POSTGRES_DB: salescat
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salescat -d salescat"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: salescat-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salescat-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      SALESCAT_ENVIRONMENT: development
      SALESCAT_DATABASE_URL: postgresql+asyncpg://salescat:salescat@db:5432/salescat
      SALESCAT_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: salescat-web
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
